const card=document.getElementById('bizCard'),wrap=document.querySelector('.card-wrap'),logo=document.getElementById('logoWrap'),glow=document.getElementById('cursorGlow'),cv=document.getElementById('particleCanvas'),ctx=cv.getContext('2d');
let particles=[],pointerX=window.innerWidth/2,pointerY=window.innerHeight/2;
function resize(){cv.width=window.innerWidth*window.devicePixelRatio;cv.height=window.innerHeight*window.devicePixelRatio;cv.style.width=window.innerWidth+'px';cv.style.height=window.innerHeight+'px';ctx.setTransform(window.devicePixelRatio,0,0,window.devicePixelRatio,0,0);particles=Array.from({length:38},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.8+.5,a:Math.random()*.45+.08,vx:(Math.random()-.5)*.12,vy:(Math.random()-.5)*.12,pulse:Math.random()*Math.PI*2}))}

function animateParticles(time){ctx.clearRect(0,0,window.innerWidth,window.innerHeight);const t=time*.001;for(const p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<-20)p.x=window.innerWidth+20;if(p.x>window.innerWidth+20)p.x=-20;if(p.y<-20)p.y=window.innerHeight+20;if(p.y>window.innerHeight+20)p.y=-20;const dx=pointerX-p.x,dy=pointerY-p.y,dist=Math.sqrt(dx*dx+dy*dy),influence=Math.max(0,1-dist/220),radius=p.r+Math.sin(t+p.pulse)*.35+influence*1.2,alpha=p.a+influence*.18;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.2,radius),0,Math.PI*2);ctx.fillStyle=`rgba(120, 244, 255, ${alpha})`;ctx.fill()}requestAnimationFrame(animateParticles)}
